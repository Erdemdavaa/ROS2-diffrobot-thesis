my_namespace:
  amcl:
    ros__parameters:
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      alpha5: 0.2
      base_frame_id: "[my_namespace]base_footprint"
      beam_skip_distance: 0.5
      beam_skip_error_threshold: 0.9
      beam_skip_threshold: 0.3
      do_beamskip: false
      global_frame_id: "[map_namespace]map"
      lambda_short: 0.1
      laser_likelihood_max_dist: 2.0
      laser_max_range: 100.0
      laser_min_range: -1.0
      laser_model_type: likelihood_field
      max_beams: 60
      max_particles: 2000
      min_particles: 500
      odom_frame_id: "[my_namespace]odom"
      pf_err: 0.05
      pf_z: 0.99
      recovery_alpha_fast: 0.0
      recovery_alpha_slow: 0.0
      resample_interval: 1
      robot_model_type: nav2_amcl::DifferentialMotionModel
      save_pose_rate: 0.5
      scan_topic: "/[my_namespace]scan"
      map_topic: "/[map_namespace]map"
      sigma_hit: 0.2
      tf_broadcast: true
      transform_tolerance: 1.0
      update_min_a: 0.2
      update_min_d: 0.25
      use_sim_time: true
      z_hit: 0.5
      z_max: 0.05
      z_rand: 0.5
      z_short: 0.05
      set_initial_pose: true
      always_reset_initial_pose: false
      first_map_only: false
      initial_pose:
        x: 0.0
        y: 0.0
        z: 0.0
        yaw: 0.0
  amcl_map_client:
    ros__parameters:
      use_sim_time: true
  amcl_rclcpp_node:
    ros__parameters:
      use_sim_time: true
  behavior_server:
    ros__parameters:
      costmap_topic: "/[my_namespace]local_costmap/costmap_raw"
      footprint_topic: "/[my_namespace]local_costmap/published_footprint"
      global_frame: "[my_namespace]odom"
      robot_base_frame: "[my_namespace]base_footprint"
      use_sim_time: true
  bt_navigator:
    ros__parameters:
      bt_loop_duration: 10
      default_server_timeout: 20
      enable_groot_monitoring: true
      global_frame: "[map_namespace]map"
      groot_zmq_publisher_port: 1666
      groot_zmq_server_port: 1667
      odom_topic: "/[my_namespace]odom"
      plugin_lib_names:
        - nav2_compute_path_to_pose_action_bt_node
        - nav2_compute_path_through_poses_action_bt_node
        - nav2_follow_path_action_bt_node
        - nav2_back_up_action_bt_node
        - nav2_spin_action_bt_node
        - nav2_wait_action_bt_node
        - nav2_clear_costmap_service_bt_node
        - nav2_is_stuck_condition_bt_node
        - nav2_goal_reached_condition_bt_node
        - nav2_goal_updated_condition_bt_node
        - nav2_initial_pose_received_condition_bt_node
        - nav2_reinitialize_global_localization_service_bt_node
        - nav2_rate_controller_bt_node
        - nav2_distance_controller_bt_node
        - nav2_speed_controller_bt_node
        - nav2_truncate_path_action_bt_node
        - nav2_goal_updater_node_bt_node
        - nav2_recovery_node_bt_node
        - nav2_pipeline_sequence_bt_node
        - nav2_round_robin_node_bt_node
        - nav2_transform_available_condition_bt_node
        - nav2_time_expired_condition_bt_node
        - nav2_distance_traveled_condition_bt_node
        - nav2_single_trigger_bt_node
        - nav2_is_battery_low_condition_bt_node
        - nav2_navigate_through_poses_action_bt_node
        - nav2_navigate_to_pose_action_bt_node
        - nav2_remove_passed_goals_action_bt_node
        - nav2_planner_selector_bt_node
        - nav2_controller_selector_bt_node
        - nav2_goal_checker_selector_bt_node
      robot_base_frame: "[my_namespace]base_footprint"
      use_sim_time: true
  bt_navigator_rclcpp_node:
    ros__parameters:
      use_sim_time: true
  controller_server:
    ros__parameters:
      FollowPath:
        BaseObstacle.scale: 0.02
        GoalAlign.forward_point_distance: 0.1
        GoalAlign.scale: 24.0
        GoalDist.scale: 24.0
        PathAlign.forward_point_distance: 0.1
        PathAlign.scale: 32.0
        PathDist.scale: 32.0
        RotateToGoal.lookahead_time: -1.0
        RotateToGoal.scale: 32.0
        RotateToGoal.slowing_factor: 5.0
        acc_lim_theta: 3.2
        acc_lim_x: 2.5
        acc_lim_y: 0.0
        angular_granularity: 0.025
        critics:
          - RotateToGoal
          - Oscillation
          - BaseObstacle
          - GoalAlign
          - PathAlign
          - PathDist
          - GoalDist
        debug_trajectory_details: true
        decel_lim_theta: -3.2
        decel_lim_x: -2.5
        decel_lim_y: 0.0
        linear_granularity: 0.05
        max_speed_xy: 0.26
        max_vel_theta: 1.0
        max_vel_x: 0.26
        max_vel_y: 0.0
        min_speed_theta: 0.0
        min_speed_xy: 0.0
        min_vel_x: 0.0
        min_vel_y: 0.0
        plugin: dwb_core::DWBLocalPlanner
        short_circuit_trajectory_evaluation: true
        sim_time: 1.7
        stateful: true
        trans_stopped_velocity: 0.25
        transform_tolerance: 0.2
        vtheta_samples: 20
        vx_samples: 20
        vy_samples: 5
        xy_goal_tolerance: 0.25
      controller_frequency: 20.0
      controller_plugins:
        - FollowPath
      failure_tolerance: 0.3
      general_goal_checker:
        plugin: nav2_controller::SimpleGoalChecker
        stateful: true
        xy_goal_tolerance: 0.1
        yaw_goal_tolerance: 3.14
      goal_checker_plugins:
        - general_goal_checker
      min_theta_velocity_threshold: 0.001
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.5
      odom_topic: "/[my_namespace]odom"
      progress_checker:
        movement_time_allowance: 10.0
        plugin: nav2_controller::SimpleProgressChecker
        required_movement_radius: 0.5
      progress_checker_plugin: progress_checker
      speed_limit_topic: "/[my_namespace]speed_limit"
      use_sim_time: true
  controller_server_rclcpp_node:
    ros__parameters:
      use_sim_time: true
  global_costmap:
    global_costmap:
      ros__parameters:
        always_send_full_costmap: true
        global_frame: "[map_namespace]map"
        height: 3
        inflation_layer:
          cost_scaling_factor: 3.0
          inflation_radius: 0.2
          plugin: nav2_costmap_2d::InflationLayer
        obstacle_layer:
          enabled: true
          observation_sources: scan
          plugin: nav2_costmap_2d::ObstacleLayer
          scan:
            clearing: true
            data_type: LaserScan
            marking: true
            max_obstacle_height: 2.0
            obstacle_max_range: 4.5
            obstacle_min_range: 0.0
            raytrace_max_range: 5.0
            raytrace_min_range: 0.0
            sensor_frame: "[my_namespace]base_scan"
            topic: "/[my_namespace]scan"
        plugins:
          - static_layer
          - obstacle_layer
          - inflation_layer
        publish_frequency: 1.0
        resolution: 0.01
        robot_base_frame: "[my_namespace]base_footprint"
        robot_radius: 0.15
        static_layer:
          map_subscribe_transient_local: true
          plugin: nav2_costmap_2d::StaticLayer
        track_unknown_space: true
        update_frequency: 1.0
        use_sim_time: true
        width: 3
        map_topic: "/[map_namespace]map"
    global_costmap_client:
      ros__parameters:
        use_sim_time: true
    global_costmap_rclcpp_node:
      ros__parameters:
        use_sim_time: true
  local_costmap:
    local_costmap:
      ros__parameters:
        always_send_full_costmap: true
        footprint: "[ [0.11, 0.11], [0.11, -0.11], [-0.11, -0.11], [-0.11, 0.11] ]"
        global_frame: "[my_namespace]odom"
        height: 3
        inflation_layer:
          cost_scaling_factor: 3.0
          inflation_radius: 0.55
          plugin: nav2_costmap_2d::InflationLayer
        plugins:
          - voxel_layer
          - inflation_layer
        publish_frequency: 2.0
        resolution: 0.05
        robot_base_frame: "[my_namespace]base_footprint"
        rolling_window: true
        static_layer:
          map_subscribe_transient_local: true
        update_frequency: 5.0
        use_sim_time: true
        voxel_layer:
          enabled: true
          mark_threshold: 0
          max_obstacle_height: 2.0
          observation_sources: scan
          origin_z: 0.0
          plugin: nav2_costmap_2d::VoxelLayer
          publish_voxel_map: true
          scan:
            clearing: true
            data_type: LaserScan
            marking: true
            max_obstacle_height: 2.0
            obstacle_max_range: 4.5
            obstacle_min_range: 0.0
            raytrace_max_range: 5.0
            raytrace_min_range: 0.0
            sensor_frame: "[my_namespace]base_scan"
            topic: "/[my_namespace]scan"
          z_resolution: 0.05
          z_voxels: 16
        width: 3
        map_topic: "/[map_namespace]map"
    local_costmap_client:
      ros__parameters:
        use_sim_time: true
    local_costmap_rclcpp_node:
      ros__parameters:
        use_sim_time: true
  map_saver:
    ros__parameters:
      free_thresh_default: 0.25
      map_subscribe_transient_local: true
      occupied_thresh_default: 0.65
      save_map_timeout: 5.0
      use_sim_time: true
  map_server:
    ros__parameters:
      frame_id: "[map_namespace]map"
      topic_name: "/[map_namespace]map"
      use_sim_time: true
      yaml_filename: gopigo3_example_map.yaml
  planner_server:
    ros__parameters:
      GridBased:
        allow_unknown: true
        plugin: nav2_navfn_planner/NavfnPlanner
        tolerance: 0.5
        use_astar: false
      expected_planner_frequency: 20.0
      planner_plugins:
        - GridBased
      use_sim_time: true
  planner_server_rclcpp_node:
    ros__parameters:
      use_sim_time: true
  recoveries_server:
    ros__parameters:
      backup:
        plugin: nav2_recoveries/BackUp
      costmap_topic: "[my_namespace]local_costmap/costmap_raw"
      cycle_frequency: 10.0
      footprint_topic: "[my_namespace]local_costmap/published_footprint"
      global_frame: "[my_namespace]odom"
      max_rotational_vel: 1.0
      min_rotational_vel: 0.4
      recovery_plugins:
        - spin
        - backup
        - wait
      robot_base_frame: "[my_namespace]base_footprint"
      rotational_acc_lim: 3.2
      simulate_ahead_time: 2.0
      spin:
        plugin: nav2_recoveries/Spin
      transform_timeout: 0.1
      use_sim_time: true
      wait:
        plugin: nav2_recoveries/Wait
  robot_state_publisher:
    ros__parameters:
      use_sim_time: true
  smoother_server:
    ros__parameters:
      costmap_topic: "/[my_namespace]global_costmap/costmap_raw"
      footprint_topic: "/[my_namespace]global_costmap/published_footprint"
      robot_base_frame: "[my_namespace]base_footprint"
      simple_smoother:
        do_refinement: true
        max_its: 1000
        plugin: nav2_smoother::SimpleSmoother
        tolerance: 1.0e-10
      smoother_plugins:
        - simple_smoother
      use_sim_time: true
  velocity_smoother:
    ros__parameters:
      deadband_velocity:
        - 0.0
        - 0.0
        - 0.0
      feedback: OPEN_LOOP
      max_accel:
        - 0.1
        - 0.1
        - 1.0
      max_decel:
        - -0.1
        - -0.1
        - -1.0
      max_velocity:
        - 1.0
        - 1.0
        - 2.0
      min_velocity:
        - -1.0
        - -1.0
        - -2.0
      odom_duration: 0.1
      odom_topic: "/[my_namespace]odom"
      scale_velocities: false
      smoothing_frequency: 20.0
      use_realtime_priority: false
      use_sim_time: true
      velocity_timeout: 1.0
  waypoint_follower:
    ros__parameters:
      loop_rate: 20
      stop_on_failure: false
      use_sim_time: true
      wait_at_waypoint:
        enabled: true
        plugin: nav2_waypoint_follower::WaitAtWaypoint
        waypoint_pause_duration: 200
      waypoint_task_executor_plugin: wait_at_waypoint
