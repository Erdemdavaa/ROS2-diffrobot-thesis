# Robot specific mappings
- ros_topic_name: "[my_namespace]joint_states"
  gz_topic_name: "/world/empty/model/[my_namespace]joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "[my_namespace]cmd_vel"
  gz_topic_name: "[my_namespace]cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: BIDIRECTIONAL

- ros_topic_name: "[my_namespace]odom"
  gz_topic_name: "[my_namespace]odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: BIDIRECTIONAL

- ros_topic_name: "[my_namespace]scan"
  gz_topic_name: "[my_namespace]scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: BIDIRECTIONAL

- ros_topic_name: "[my_namespace]scan/points"
  gz_topic_name: "[my_namespace]scan/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: BIDIRECTIONAL

# TF mappings
- ros_topic_name: "/[my_namespace]tf"
  gz_topic_name: "/[my_namespace]tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: BIDIRECTIONAL
